# This tmux config ships without a plugin manager.
# I was a tpm user, then moved to tpack, but
# it seems tpack auto-downloads an unverified
# binary from GitHub Releases and sources every plugin on disk regardless of
# what's declared here. Yikes.
# Instead, plugins are plain git clones, sourced
# directly at the bottom of this file.
# My tmux use is heavy, but I don't change the plugins often, so this works for
# me.
# Install (pinned to audited commits; update deliberately with git pull):
#  e.g.:
#   git clone https://github.com/tmux-plugins/tmux-sensible ~/.tmux/plugins/tmux-sensible
#   git -C ~/.tmux/plugins/tmux-sensible checkout 25cb91f42d020f675bb0a2ce3fbd3a5d96119efa
#   git clone https://github.com/tmux-plugins/tmux-yank ~/.tmux/plugins/tmux-yank
#   git -C ~/.tmux/plugins/tmux-yank checkout acfd36e4fcba99f8310a7dfb432111c242fe7392

# I set the backtick (`) as my tmux control/prefix key:
# this may not be what you expect.
unbind C-b
set -g prefix `
# now let me actually type ` as well
bind-key ` send-prefix

#I keep pressing m instead of n...
unbind m
# terminal
set-option -sa terminal-overrides ",xterm*:Tc"
# mouse off
set -g mouse off
# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# ----------------------------------------------------------------------------
# So, I got the dracula colour theme and just hard-coded it here.
# Palette: fg #f8f8f2, green #50fa7b, purple #bd93f9, comment #6272a4,
# gray #44475a, yellow #f1fa8c (prefix flash), bg=default.
#
# The bottom statusline looks like:
#
#   hostname    1 vim · 2 ssh · 3 logs            2026-07-05 · 21:34
#
#  (Nerd Font required for the terminal icon)
set -g status-left-length 40
set -g status-right-length 40
set -g status-style "bg=default,fg=#f8f8f2"
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g mode-style "bg=#44475a,fg=#f8f8f2"
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
set-window-option -g clock-mode-colour "#bd93f9"

# short hostname in CAPS
# (all caps when you say the man's name)
# flashes  yellow while the prefix is active
set -g status-left "#[fg=#50fa7b,bold]#{?client_prefix,#[fg=#f1fa8c],}#(hostname -s | tr '[:lower:]' '[:upper:]')   "
# uh and  tmux formats can't upcase, hence the shell hop above

# window list: current = purple bold, others = comment grey, dim · between.
# minimal, some glyphs
set-window-option -g window-status-separator "#[fg=#44475a] · "
set-window-option -g window-status-format "#[fg=#6272a4]#I #W#{?window_zoomed_flag, ⌕,}#{?window_bell_flag, 🔔,}"
set-window-option -g window-status-current-format "#[fg=#bd93f9,bold]#I #W#[nobold]#{?window_zoomed_flag, ⌕,}#{?window_bell_flag, 🔔,}"
set-window-option -g window-status-activity-style bold
set-window-option -g window-status-bell-style bold

# ISO date · 24-h clock, timezone dimmed
set -g status-right "#[fg=#6272a4]%Y-%m-%d #[fg=#44475a]· #[fg=#f8f8f2]%H:%M #[fg=#6272a4]%Z "
# ----------------------------------------------------------------------------

# Easy bindings for split panes
unbind %
bind | split-window -h
bind - split-window -v

# Source plugins directly (skips quietly if a plugin isn't cloned yet)
run-shell 'f=~/.tmux/plugins/tmux-sensible/sensible.tmux; [ -f "$f" ] && "$f" || true'
run-shell 'f=~/.tmux/plugins/tmux-yank/yank.tmux;         [ -f "$f" ] && "$f" || true'

# Must come after sensible: it sees status-interval at the default (15) and
# "helpfully" drops it to 5
# ...
set -g status-interval 15
